apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: node-app-ingress
  namespace: production-app
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "false" # Set to true once a real domain is configured
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  # Uncomment the tls section below once you map your real registered domain name
  # tls:
  # - hosts:
  #   - app.yourdomain.com
  #   secretName: node-app-tls
  rules:
  - http: # Removed host constraint so you can access directly via the public IP for testing!
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: node-app-service
            port:
              number: 80
