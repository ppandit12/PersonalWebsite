name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package*.json'
      - 'kubernetes/**'
      - '.github/workflows/deploy.yml'

jobs:
  # ==========================================================
  # Job 1: Continuous Integration (Test & Build Container)
  # ==========================================================
  ci-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Build & Linting Check
        run: npm run lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/personal-website:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/personal-website:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================
  # Job 2: Continuous Deployment (SSH & Apply to K8s)
  # ==========================================================
  cd-pipeline:
    needs: ci-pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder'
          if_key_exists: replace

      - name: Add Master Node to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_MASTER_PUBLIC_IP }} >> ~/.ssh/known_hosts

      - name: Copy Kubernetes Manifests to Master Node
        run: |
          scp -r kubernetes ubuntu@${{ secrets.EC2_MASTER_PUBLIC_IP }}:/home/ubuntu/

      - name: Deploy Workloads and Verify Rollout via SSH
        run: |
          ssh ubuntu@${{ secrets.EC2_MASTER_PUBLIC_IP }} << 'EOF'
            set -e
            
            echo "1. Applying core namespace"
            kubectl apply -f /home/ubuntu/kubernetes/namespace.yaml
            
            echo "2. Applying service routing, ingress, and HPA configurations"
            kubectl apply -f /home/ubuntu/kubernetes/service.yaml
            kubectl apply -f /home/ubuntu/kubernetes/ingress.yaml
            kubectl apply -f /home/ubuntu/kubernetes/hpa.yaml
            
            echo "3. Updating deployment manifest image and git-sha dynamically"
            # Set the image tag to the unique Git SHA of this workflow run
            kubectl set image -f /home/ubuntu/kubernetes/deployment.yaml \
              node-app=docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/personal-website:${{ github.sha }} \
              --local -o yaml > /tmp/deployment_updated.yaml
            
            # Update the GIT_SHA environment variable in the container spec for observability
            sed -i 's/value: "PLACEHOLDER_GIT_SHA"/value: "${{ github.sha }}"/g' /tmp/deployment_updated.yaml
            
            # Apply the dynamically generated manifest
            kubectl apply -f /tmp/deployment_updated.yaml
            
            echo "4. Monitoring rollout status for zero-downtime success"
            kubectl rollout status deployment/node-app-deployment -n production-app --timeout=120s
            
            echo "5. Verifying running Pods in production-app namespace"
            kubectl get pods -n production-app -o wide
            
            echo "6. Checking application endpoints inside cluster"
            kubectl run curl-test --image=curlimages/curl --restart=Never -n production-app --rm -i -- \
              curl -s http://node-app-service/
              
            echo "Rollout successfully completed and verified!"
          EOF
