server {
    listen 80;
    server_name localhost;

    # Static assets directory
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Essential for Single Page Applications (SPA) fallback routing
        try_files $uri $uri/ /index.html;
    }

    # Enable gzip compression for better page load performance
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Cache control for static assets (optional, recommended for production CSS/JS)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Custom error page
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
