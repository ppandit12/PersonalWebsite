---
# ==========================================================
# Kubernetes Master Node Configuration Tasks
# ==========================================================

- name: Check if Kubernetes control plane is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_init_check

- name: Initialize Kubernetes cluster control plane
  command: >
    kubeadm init
    --apiserver-advertise-address={{ internal_ip }}
    --pod-network-cidr={{ pod_network_cidr }}
  register: kubeadm_init_output
  when: not k8s_init_check.stat.exists
  changed_when: true

- name: Create local .kube config directory for administrative user
  file:
    path: "/home/ubuntu/.kube"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Copy kubernetes admin.conf to user's home directory
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "/home/ubuntu/.kube/config"
    remote_src: yes
    owner: ubuntu
    group: ubuntu
    mode: '0600'

- name: Install Calico operator container network interface
  become: false
  command: kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.3/manifests/tigera-operator.yaml
  register: calico_operator_install
  when: not k8s_init_check.stat.exists
  changed_when: true

- name: Download Calico custom resources manifest
  become: false
  get_url:
    url: https://raw.githubusercontent.com/projectcalico/calico/v3.27.3/manifests/custom-resources.yaml
    dest: /home/ubuntu/calico-custom-resources.yaml
    owner: ubuntu
    group: ubuntu
    mode: '0644'
  when: not k8s_init_check.stat.exists

- name: Customize Pod CIDR in Calico custom resources
  become: false
  replace:
    path: /home/ubuntu/calico-custom-resources.yaml
    regexp: 'cidr: 192.168.0.0/16'
    replace: "cidr: {{ pod_network_cidr }}"
  when: not k8s_init_check.stat.exists

- name: Apply Calico custom resources manifest to spin up CNI pods
  become: false
  command: kubectl create -f /home/ubuntu/calico-custom-resources.yaml
  when: not k8s_init_check.stat.exists
  changed_when: true

- name: Allow scheduling system jobs on Master node to prevent Helm pre-install deadlocks (untaint master)
  become: false
  command: kubectl taint nodes --all node-role.kubernetes.io/control-plane-
  failed_when: false
  changed_when: true

# Helm installation for Kubernetes addon packaging
- name: Install Helm CLI via official install script
  shell: |
    curl -fsSL -o /tmp/get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    chmod 700 /tmp/get_helm.sh
    /tmp/get_helm.sh
  args:
    creates: /usr/local/bin/helm

# Deploy Ingress Controller & Cert Manager
- name: Add Helm stable repositories
  become: false
  command: "{{ item }}"
  loop:
    - "helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx"
    - "helm repo add jetstack https://charts.jetstack.io"
  changed_when: true

- name: Update Helm repository indexes
  become: false
  command: helm repo update
  changed_when: true

- name: Provision Nginx Ingress Controller
  become: false
  command: >
    helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
    --namespace ingress-nginx --create-namespace
    --version {{ ingress_nginx_chart_version }}
    --set controller.service.type=NodePort
    --set controller.service.nodePorts.http=30080
    --set controller.service.nodePorts.https=30443
  changed_when: true

- name: Provision Cert-Manager for SSL
  become: false
  command: >
    helm upgrade --install cert-manager jetstack/cert-manager
    --namespace cert-manager --create-namespace
    --version {{ cert_manager_chart_version }}
    --set installCRDs=true
  changed_when: true

# Generate Let's Encrypt Issuers
- name: Create Let's Encrypt Production ClusterIssuer manifest
  template:
    src: letsencrypt-issuer.yaml.j2
    dest: /home/ubuntu/letsencrypt-issuer.yaml
    owner: ubuntu
    group: ubuntu
    mode: '0644'

- name: Deploy Let's Encrypt ClusterIssuer
  become: false
  command: kubectl apply -f /home/ubuntu/letsencrypt-issuer.yaml
  changed_when: true

# Extract K8s Token Join command dynamically for Worker Nodes
- name: Generate worker node join command token
  command: kubeadm token create --print-join-command
  register: k8s_join_command
  changed_when: false

- name: Save K8s join command token as a variable on a dummy host for sharing
  add_host:
    name: "K8S_JOIN_COMMAND_HOLDER"
    join_command: "{{ k8s_join_command.stdout }}"
