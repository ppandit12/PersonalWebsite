# ==========================================================
# Global Ansible Variables configuration
# ==========================================================

# Pin Kubernetes Version to ensure stability
k8s_version: "1.30.1-1.1" # Standard apt package version format
k8s_version_short: "v1.30" # Used for repository registration

# Pod Network CIDR for Calico CNI
pod_network_cidr: "192.168.0.0/16"

# Container Network Interface choice
cni_type: "calico" # Options: calico, flannel

# Helm Chart Versions
ingress_nginx_chart_version: "4.10.1"
cert_manager_chart_version: "v1.14.5"

# Let's Encrypt email for Cert-Manager TLS Issuer
letsencrypt_email: "admin@yourdomain.com"
